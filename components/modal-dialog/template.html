<dialog class="modal-dialog" id="my-modal">

    <slot name="title"><h3>对话框标题</h3></slot>
    <button class="modal-close" aria-label="关闭">✕</button>
  </div>
  <div class="modal-body"><slot>对话框内容</slot></div>
  <div class="modal-footer">

    </slot>
  </div>
</dialog>
