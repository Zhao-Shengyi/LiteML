<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <title>LiteML 全部特性测试</title>
  <style>
.eject-grid-0 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 768px) {
  .eject-grid-0 {
    grid-template-columns: repeat(1, 1fr);
  }
}
.eject-waterfall-1 {
  column-count: 4;
  column-gap: 16px;
}
.eject-waterfall-1 > * {
  break-inside: avoid;
  margin-bottom: 16px;
}
@media (max-width: 768px) {
  .eject-waterfall-1 {
    column-count: 1;
  }
}
@media (max-width: 768px) {
  .eject-hide-2 { display: none !important; }
}
  </style>
  </head>
  <body>
    <h1>LiteML 特性测试大全</h1>
    <!-- ====== 1. 基础标签与属性 ====== -->
    <div id="app" class="container">
      <h1 class="title">标题文字</h1>
      <p class="desc intro">这是一段描述文字</p>
      <a href="/about" target="_blank">关于我们</a>
      <input type="text" placeholder="请输入" required>
    </div>
    <!-- ====== 2. 多媒体宏 ====== -->
    <audio src="song.mp3" controls></audio>
    <audio controls autoplay><source src="song.mp3"><source src="song.ogg"></audio>
    <video src="movie.mp4" controls width="100%"></video>
    <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">
      <iframe src="https://example.com/video" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" frameborder="0" allowfullscreen></iframe>
    </div>
    <i class="icon-star"></i>
    <img src="logo.png" alt="Logo">
    <!-- ====== 3. 外部资源 ====== -->
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <!-- ====== 4. 布局指令 (LiteCSS) ====== -->
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <div class="item">项目 1</div>
      <div class="item">项目 2</div>
    </div>
    <div class="eject-grid-0">
      <div class="card">卡片 1</div>
      <div class="card">卡片 2</div>
      <div class="card">卡片 3</div>
    </div>
    <div class="eject-waterfall-1">
      <div class="card">瀑布流 1</div>
      <div class="card">瀑布流 2</div>
      <div class="card">瀑布流 3</div>
      <div class="card">瀑布流 4</div>
    </div>
    <div style="position: fixed; top: 0; right: 0;">
      <p>固定在右上角</p>
    </div>
    <div style="transition: all 0.3s ease">
      <p>悬停有效果</p>
    </div>
    <p class="eject-hide-2">手机端隐藏</p>
    <!-- ====== 5. 交互指令 (LiteJS) ====== -->
    <button class="btn" id="btn-modal-3">打开弹窗</button>
    <dialog id="my-dialog">
      <h2>弹窗标题</h2>
      <p>弹窗内容</p>
      <button>关闭</button>
    </dialog>
    <button class="eject-like-4">点赞</button>
    <!-- ====== 6. 行为属性 ====== -->
    <form>
      <input type="email" required type="email">
      <input type="text" required minlength="2">
      <input type="number" required min="1" max="100">
    </form>
    <!-- ====== 7. 长文本块 ====== -->
    <article class="post">
      <h1>博客文章</h1>
      <p>这是第一段文字。可以使用三引号来写长篇内容。</p>
      <p>空一行就会变成新的段落。非常适合写博客文章。</p>
    </article>
    <!-- ====== 8. 代码块 ====== -->
    <style>
    body { background: #f0f9ff; }
          .card { padding: 1rem; }
    </style>
    <script>
    function hello() {
            console.log('Hello LiteML!');
          }
    </script>
    <!-- ====== 9. 逃生舱（原生 HTML 混写） ====== -->
    <video src="demo.mp4" controls autoplay muted>
      <source src="demo.webm" type="video/webm">
    </video>
    <!-- ====== 10. @raw 块 ====== -->
      <div class="custom-widget">
        <p>这是原始 HTML</p>
      </div>

    <footer>
      <p>LiteML v0.1 - 完整特性测试</p>
    </footer>
  <script>
(function() {
  document.getElementById("btn-modal-3").addEventListener("click", function() {
    document.querySelector("#my-dialog").showModal();
  });
  document.querySelector("#my-dialog").addEventListener("click", function(e) {
    if (e.target === this) this.close();
  });
})();
(function() {
  document.querySelectorAll(".eject-like-4").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var c = this.querySelector(".like-count");
      if (c) c.textContent = parseInt(c.textContent) + 1;
    });
  });
})();
</script>
</body>
</html>
